<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Achinos Admin - Διαχείριση</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #eef4ff; font-family: 'Segoe UI', sans-serif; }
        .app-container { width: 100%; background: rgba(255,250,240,0.96); padding: 4vw 3vw 6vw; }
        .header { text-align: center; border-bottom: 0.6vw solid #2a9d8f; padding-bottom: 4vw; margin-bottom: 5vw; }
        .logo h1 { font-size: clamp(1.8rem,8vw,6rem); background: linear-gradient(135deg,#1e6091,#2a9d8f); -webkit-background-clip:text; color:transparent; }
        .admin-tabs { display: flex; gap: 2vw; margin-bottom: 6vw; background: #e9ecef; border-radius: 15vw; padding: 2vw; }
        .tab-btn { flex: 1; background: transparent; border: none; padding: 3vw; border-radius: 12vw; font-size: clamp(1rem,4.5vw,2.5rem); font-weight: bold; color: #1e6091; cursor: pointer; }
        .tab-btn.active { background: #f4a261; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .section-card { background: white; border-radius: 8vw; padding: 6vw; margin-bottom: 6vw; border: 0.3vw solid #2a9d8f; }
        .section-title { font-size: clamp(1.3rem,6vw,3rem); color: #1e6091; margin-bottom: 5vw; font-weight: bold; }
        .form-group { margin-bottom: 5vw; }
        .form-group label { display: block; font-size: clamp(1rem,4vw,2.5rem); color: #2a9d8f; font-weight: bold; margin-bottom: 2vw; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 4vw 5vw; border: 0.3vw solid #f4a261; border-radius: 8vw; font-size: clamp(1rem,4.5vw,2.5rem); }
        .form-row { display: flex; gap: 4vw; flex-wrap: wrap; }
        .btn { padding: 4vw 6vw; border: none; border-radius: 12vw; font-size: clamp(1rem,4.5vw,2.5rem); font-weight: bold; cursor: pointer; }
        .btn-primary { background: #2a9d8f; color: white; border-bottom: 0.8vw solid #1e6091; }
        .btn-secondary { background: #f4a261; color: white; }
        .btn-danger { background: #e76f51; color: white; }
        .items-list { max-height: 60vh; overflow-y: auto; }
        .item-card { background: #f8f9fa; border-radius: 6vw; padding: 4vw; margin-bottom: 4vw; border-left: 1.5vw solid #f4a261; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 3vw; }
        .item-info { flex: 1; display: flex; flex-direction: column; gap: 2vw; }
        .item-name { font-size: clamp(1.1rem,5vw,2.8rem); font-weight: bold; color: #1e6091; }
        .item-image { width: 15vw; height: 15vw; object-fit: cover; border-radius: 4vw; background: #e9ecef; }
        .availability-switch { display: flex; align-items: center; gap: 3vw; }
        .toggle-switch { position: relative; display: inline-block; width: 15vw; height: 8vw; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; border-radius: 8vw; }
        .slider:before { position: absolute; content: ""; height: 6vw; width: 6vw; left: 1vw; bottom: 1vw; background-color: white; border-radius: 50%; transition: 0.3s; }
        input:checked + .slider { background-color: #2a9d8f; }
        input:checked + .slider:before { transform: translateX(7vw); }
        .order-card { background: white; border-radius: 6vw; padding: 5vw; margin-bottom: 4vw; border: 0.3vw solid #2a9d8f; }
        .filter-bar { display: flex; gap: 3vw; margin-bottom: 5vw; flex-wrap: wrap; }
        .filter-btn { background: #e9ecef; border: none; padding: 2vw 5vw; border-radius: 10vw; cursor: pointer; }
        .filter-btn.active { background: #2a9d8f; color: white; }
        @media (min-width: 768px) { .item-image { width: 8vw; height: 8vw; } .toggle-switch { width: 8vw; height: 4vw; } .slider:before { height: 3vw; width: 3vw; } input:checked + .slider:before { transform: translateX(4vw); } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header"><div class="logo"><h1>🏖️ ACHINOS ADMIN</h1><p>Διαχείριση Καταστήματος</p></div></div>
    <div class="admin-tabs">
        <button class="tab-btn active" data-tab="menu">📋 ΜΕΝΟΥ</button>
        <button class="tab-btn" data-tab="availability">✅ ΔΙΑΘΕΣΙΜΟΤΗΤΑ</button>
        <button class="tab-btn" data-tab="orders">📦 ΠΑΡΑΓΓΕΛΙΕΣ</button>
    </div>

    <div id="tab-menu" class="tab-content active">
        <div class="section-card">
            <div class="section-title">📁 ΚΑΤΗΓΟΡΙΕΣ</div>
            <div id="categoriesList" class="items-list"></div>
            <div class="form-group"><label>➕ Νέα Κατηγορία</label><div class="form-row"><input type="text" id="newCategoryName" placeholder="Όνομα"><input type="text" id="newCategoryEmoji" placeholder="Emoji" maxlength="2"></div>
            <div><input type="file" id="categoryImageFile" accept="image/*"><input type="text" id="newCategoryImageUrl" placeholder="ή URL" style="margin-top:2vw;"></div>
            <button id="addCategoryBtn" class="btn btn-primary">➕ Προσθήκη</button></div>
        </div>
        <div class="section-card">
            <div class="section-title">🍽️ ΠΡΟΪΟΝΤΑ</div>
            <div class="form-group"><label>Επιλογή Κατηγορίας</label><select id="productCategorySelect"></select></div>
            <div id="productsList" class="items-list"></div>
            <div class="section-title">✨ Νέο Προϊόν</div>
            <div class="form-group"><input type="text" id="newProductName" placeholder="Όνομα"></div>
            <div class="form-row"><div class="form-group"><input type="number" id="newProductPrice" placeholder="Τιμή €"></div><div class="form-group"><input type="text" id="newProductEmoji" placeholder="Emoji" maxlength="2"><button id="showEmojiPickerBtn" class="btn-secondary" style="margin-top:2vw;">😀 Emoji</button></div></div>
            <div id="emojiPickerContainer" style="display:none;"></div>
            <div class="form-group"><textarea id="newProductDesc" rows="2" placeholder="Περιγραφή"></textarea></div>
            <div class="form-group"><input type="file" id="productImageFile" accept="image/*"><input type="text" id="newProductImageUrl" placeholder="ή URL" style="margin-top:2vw;"></div>
            <button id="addProductBtn" class="btn btn-primary">➕ Προσθήκη</button>
        </div>
    </div>

    <div id="tab-availability" class="tab-content">
        <div class="section-card">
            <div class="section-title">✅ ΔΙΑΘΕΣΙΜΟΤΗΤΑ</div>
            <div class="form-group"><label>Κατηγορία</label><select id="availCategorySelect"></select></div>
            <div id="availabilityList" class="items-list"></div>
        </div>
        <div class="section-card"><div class="section-title">📱 ΠΡΟΕΠΙΣΚΟΠΗΣΗ ΠΕΛΑΤΗ</div><div id="customerPreview"></div></div>
    </div>

    <div id="tab-orders" class="tab-content">
        <div class="section-card">
            <div class="section-title">📦 ΠΑΡΑΓΓΕΛΙΕΣ</div>
            <div class="filter-bar" id="orderFilters"><button class="filter-btn active" data-filter="all">Όλες</button><button class="filter-btn" data-filter="pending">Εκκρεμείς</button><button class="filter-btn" data-filter="preparing">Παρασκευάζεται</button><button class="filter-btn" data-filter="completed">Ολοκληρωμένες</button></div>
            <div id="ordersList" class="orders-list"></div>
        </div>
    </div>
    <footer>© ACHINOS | Συγχρονισμός με Google Sheets</footer>
</div>

<script>
    // URL του Google Apps Script (αντικαταστάθηκε)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYjdUNyI_2T8WxXRho-2Sh66brRceNvXKbTyDNgdrnjMA4I0IEjbGU-Cp0eDG_M8_bWg/exec";

    let menuData = { categories: [], products: [] };
    let orders = [];
    let currentOrderFilter = "all";

    async function fetchAllData() {
        try {
            const menuRes = await fetch(`${SCRIPT_URL}?action=getMenu`);
            menuData = await menuRes.json();
            const ordersRes = await fetch(`${SCRIPT_URL}?action=getOrders`);
            orders = await ordersRes.json();
            updateUI();
        } catch(e) { console.error(e); alert("Σφάλμα φόρτωσης δεδομένων"); }
    }

    async function saveMenuToSheet() {
        await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "saveMenu", categories: menuData.categories, products: menuData.products }),
            headers: { "Content-Type": "application/json" }
        });
    }

    async function updateOrderStatus(orderId, newStatus) {
        await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "updateOrderStatus", orderId, newStatus }),
            headers: { "Content-Type": "application/json" }
        });
        await fetchAllData();
    }

    function updateUI() {
        renderCategoriesList();
        renderProductsList();
        updateCategorySelects();
        renderAvailability();
        renderCustomerPreview();
        renderOrders();
    }

    function renderCategoriesList() {
        const container = document.getElementById("categoriesList");
        container.innerHTML = menuData.categories.map(cat => `
            <div class="item-card">
                <div class="item-info"><div class="item-name">${cat.emoji} ${cat.name}</div>${cat.imageUrl ? `<img src="${cat.imageUrl}" class="item-image">` : ''}</div>
                <button class="icon-btn" onclick="deleteCategory('${cat.id}')">🗑️</button>
            </div>
        `).join("");
    }

    function deleteCategory(catId) {
        if(confirm("Διαγραφή κατηγορίας; Θα διαγραφούν και τα προϊόντα της")) {
            menuData.categories = menuData.categories.filter(c => c.id !== catId);
            menuData.products = menuData.products.filter(p => p.categoryId !== catId);
            saveMenuToSheet().then(() => fetchAllData());
        }
    }

    function renderProductsList() {
        const catId = document.getElementById("productCategorySelect")?.value;
        if(!catId) return;
        const filtered = menuData.products.filter(p => p.categoryId === catId);
        const container = document.getElementById("productsList");
        container.innerHTML = filtered.map(prod => `
            <div class="item-card">
                <div class="item-info"><div class="item-name">${prod.emoji} ${prod.name} - €${prod.price.toFixed(2)}</div>${prod.imageUrl ? `<img src="${prod.imageUrl}" class="item-image">` : ''}<div>${prod.desc}</div></div>
                <button class="icon-btn" onclick="deleteProduct('${prod.id}')">🗑️</button>
            </div>
        `).join("");
    }

    function deleteProduct(prodId) {
        if(confirm("Διαγραφή προϊόντος;")) {
            menuData.products = menuData.products.filter(p => p.id !== prodId);
            saveMenuToSheet().then(() => fetchAllData());
        }
    }

    function renderAvailability() {
        const catId = document.getElementById("availCategorySelect")?.value;
        if(!catId) return;
        const filtered = menuData.products.filter(p => p.categoryId === catId);
        const container = document.getElementById("availabilityList");
        container.innerHTML = filtered.map(prod => `
            <div class="item-card">
                <div class="item-info"><div class="item-name">${prod.emoji} ${prod.name}</div>${prod.imageUrl ? `<img src="${prod.imageUrl}" class="item-image">` : ''}</div>
                <div class="availability-switch"><span class="toggle-label">${prod.active ? "🟢 Διαθέσιμο" : "🔴 Μη διαθέσιμο"}</span>
                <label class="toggle-switch"><input type="checkbox" ${prod.active ? "checked" : ""} onchange="toggleProductActive('${prod.id}', this.checked)"><span class="slider"></span></label></div>
            </div>
        `).join("");
    }

    window.toggleProductActive = function(prodId, isActive) {
        const prod = menuData.products.find(p => p.id === prodId);
        if(prod) {
            prod.active = isActive;
            saveMenuToSheet().then(() => fetchAllData());
        }
    };

    function renderCustomerPreview() {
        const activeCats = menuData.categories.filter(c => c.active);
        let html = `<div style="background:white; border-radius:5vw; padding:4vw;">`;
        for(let cat of activeCats) {
            const activeProds = menuData.products.filter(p => p.categoryId === cat.id && p.active);
            if(!activeProds.length) continue;
            html += `<div style="margin-bottom:5vw;"><strong>${cat.emoji} ${cat.name}</strong>`;
            for(let prod of activeProds) {
                html += `<div style="display:flex; gap:4vw; padding:2vw 0; border-bottom:0.1vw solid #eee;">
                            ${prod.imageUrl ? `<img src="${prod.imageUrl}" style="width:12vw; height:12vw; object-fit:cover; border-radius:3vw;">` : `<div style="width:12vw; text-align:center;">${prod.emoji}</div>`}
                            <div><strong>${prod.name}</strong><br>${prod.desc}<br><span style="color:#f4a261;">€${prod.price.toFixed(2)}</span></div>
                         </div>`;
            }
            html += `</div>`;
        }
        html += `</div>`;
        document.getElementById("customerPreview").innerHTML = html;
    }

    function renderOrders() {
        let filtered = orders;
        if(currentOrderFilter !== "all") filtered = orders.filter(o => o.status === currentOrderFilter);
        const container = document.getElementById("ordersList");
        container.innerHTML = filtered.map(order => `
            <div class="order-card">
                <div><strong>#${order.id}</strong> <span class="badge">${order.status === "pending" ? "⏳ Εκκρεμεί" : order.status === "preparing" ? "👨‍🍳 Παρασκευάζεται" : "✅ Ολοκληρώθηκε"}</span></div>
                <div>🏖️ Ξαπλώστρα: ${order.sunbed} | 👤 ${order.customerName}</div>
                <div>${order.items.map(i => `${i.name} x${i.quantity}`).join(", ")}<br><strong>Σύνολο: €${order.total.toFixed(2)}</strong>${order.notes ? `<br>📝 ${order.notes}` : ""}</div>
                <div style="margin-top:3vw;">
                    ${order.status === "pending" ? `<button onclick="updateOrderStatus('${order.id}','preparing')" class="btn-secondary">👨‍🍳 Παρασκευή</button>` : ""}
                    ${order.status === "preparing" ? `<button onclick="updateOrderStatus('${order.id}','completed')" class="btn-primary">✅ Ολοκλήρωση</button>` : ""}
                </div>
            </div>
        `).join("");
        if(filtered.length === 0) container.innerHTML = "<div>Δεν υπάρχουν παραγγελίες</div>";
    }

    function updateCategorySelects() {
        const select1 = document.getElementById("productCategorySelect");
        const select2 = document.getElementById("availCategorySelect");
        const opts = menuData.categories.map(c => `<option value="${c.id}">${c.emoji} ${c.name}</option>`).join("");
        if(select1) { select1.innerHTML = opts; if(menuData.categories.length) select1.value = menuData.categories[0].id; }
        if(select2) { select2.innerHTML = opts; if(menuData.categories.length) select2.value = menuData.categories[0].id; }
    }

    // Προσθήκη κατηγορίας
    document.getElementById("addCategoryBtn")?.addEventListener("click", () => {
        const name = document.getElementById("newCategoryName").value.trim();
        const emoji = document.getElementById("newCategoryEmoji").value.trim() || "📁";
        if(!name) return alert("Εισάγετε όνομα");
        const file = document.getElementById("categoryImageFile").files[0];
        let imageUrl = document.getElementById("newCategoryImageUrl").value.trim();
        if(file) {
            const reader = new FileReader();
            reader.onload = e => {
                imageUrl = e.target.result;
                menuData.categories.push({ id: "cat_"+Date.now(), name, emoji, imageUrl, active: true });
                saveMenuToSheet().then(() => fetchAllData());
            };
            reader.readAsDataURL(file);
        } else {
            menuData.categories.push({ id: "cat_"+Date.now(), name, emoji, imageUrl, active: true });
            saveMenuToSheet().then(() => fetchAllData());
        }
        document.getElementById("newCategoryName").value = "";
        document.getElementById("newCategoryEmoji").value = "";
        document.getElementById("newCategoryImageUrl").value = "";
        document.getElementById("categoryImageFile").value = "";
    });

    // Προσθήκη προϊόντος
    document.getElementById("addProductBtn")?.addEventListener("click", () => {
        const catId = document.getElementById("productCategorySelect").value;
        const name = document.getElementById("newProductName").value.trim();
        const price = parseFloat(document.getElementById("newProductPrice").value);
        const emoji = document.getElementById("newProductEmoji").value.trim() || "🍽️";
        const desc = document.getElementById("newProductDesc").value.trim();
        if(!name || isNaN(price)) return alert("Συμπληρώστε όνομα και τιμή");
        const file = document.getElementById("productImageFile").files[0];
        let imageUrl = document.getElementById("newProductImageUrl").value.trim();
        if(file) {
            const reader = new FileReader();
            reader.onload = e => {
                imageUrl = e.target.result;
                menuData.products.push({ id: "prod_"+Date.now(), categoryId: catId, name, price, emoji, desc, imageUrl, active: true });
                saveMenuToSheet().then(() => fetchAllData());
            };
            reader.readAsDataURL(file);
        } else {
            menuData.products.push({ id: "prod_"+Date.now(), categoryId: catId, name, price, emoji, desc, imageUrl, active: true });
            saveMenuToSheet().then(() => fetchAllData());
        }
        document.getElementById("newProductName").value = "";
        document.getElementById("newProductPrice").value = "";
        document.getElementById("newProductEmoji").value = "";
        document.getElementById("newProductDesc").value = "";
        document.getElementById("newProductImageUrl").value = "";
        document.getElementById("productImageFile").value = "";
    });

    // Emoji picker
    const emojis = ["🍹","🍸","🥤","☕","🍽️","🍰","🥗","🍤","🍊","🍻","🍴","🥛"];
    document.getElementById("showEmojiPickerBtn")?.addEventListener("click", () => {
        const container = document.getElementById("emojiPickerContainer");
        if(container.style.display === "none") {
            container.style.display = "block";
            container.innerHTML = `<div class="emoji-picker">${emojis.map(e => `<span class="emoji-option" onclick="document.getElementById('newProductEmoji').value='${e}'; document.getElementById('emojiPickerContainer').style.display='none';">${e}</span>`).join("")}</div>`;
        } else container.style.display = "none";
    });

    // Tabs
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            document.querySelectorAll(".tab-content").forEach(tc => tc.classList.remove("active"));
            document.getElementById(`tab-${btn.dataset.tab}`).classList.add("active");
            if(btn.dataset.tab === "availability") renderAvailability();
            if(btn.dataset.tab === "orders") renderOrders();
        });
    });
    document.getElementById("productCategorySelect")?.addEventListener("change", () => renderProductsList());
    document.getElementById("availCategorySelect")?.addEventListener("change", () => renderAvailability());
    document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentOrderFilter = btn.dataset.filter;
            renderOrders();
        });
    });

    fetchAllData();
</script>
</body>
</html>
